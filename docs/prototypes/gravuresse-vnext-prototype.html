.settings-content{padding:19px;overflow:hidden}.account-list{display:grid;gap:11px}.account-row{display:grid;grid-template-columns:43px 1fr auto;gap:13px;align-items:center;padding:13px;border:1px solid var(--border-subtle);border-radius:var(--r-lg);background:var(--bg-elevated);box-shadow:var(--shadow-sm)}.provider-icon{width:41px;height:41px;border:1px solid var(--border-default);border-radius:11px;display:grid;place-items:center;font-weight:800;color:var(--accent);background:linear-gradient(180deg,var(--bg-elevated),var(--bg-surface));box-shadow:0 1px 0 rgba(255,255,255,.55) inset}
    .spec-board{min-height:0;flex:1;padding:18px;display:grid;grid-template-columns:1.1fr .9fr;grid-template-rows:auto auto auto 1fr;gap:13px;overflow:hidden}.spec-card{border:1px solid var(--border-subtle);border-radius:var(--r-lg);background:var(--bg-elevated);padding:14px;overflow:hidden;box-shadow:var(--shadow-sm)}.spec-card h2{margin:0 0 9px;font-size:15px;font-weight:760;letter-spacing:-.02em}.spec-card p{margin:0;color:var(--text-muted)}.layout-mini{display:grid;grid-template-columns:56px 390px 1fr 320px;height:96px;border:1px solid var(--border-subtle);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-xs)}.layout-mini div{display:grid;place-items:center;text-align:center;border-right:1px solid var(--border-subtle);color:var(--text-secondary);font-size:11px;background:linear-gradient(180deg,var(--bg-elevated),var(--bg-primary))}.layout-mini div:last-child{border-right:0}.tokens{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.token{height:66px;border:1px solid var(--border-subtle);border-radius:var(--r);padding:7px;display:flex;flex-direction:column;justify-content:end;font-size:10px;color:#111;box-shadow:0 1px 0 rgba(255,255,255,.35) inset}.t1{background:#ECEFF3}.t2{background:#F8F8F7}.t3{background:#fff}.t4{background:#26282D;color:#fff}.t5{background:#258B5B;color:#fff}.t6{background:#D64545;color:#fff}.t7{background:#0B0D10;color:#fff}.t8{background:#111419;color:#fff}.t9{background:#181C22;color:#fff}.t10{background:#F6F7F8}.t11{background:#3CBA7A}.t12{background:#E86060}.component-grid{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:10px}.component-grid .btn,.component-grid .pill{width:100%;justify-content:center}.do-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}.do,.dont{padding:11px;border:1px solid var(--border-subtle);border-radius:var(--r-lg);background:var(--bg-primary);box-shadow:var(--shadow-xs)}.do h3,.dont h3{margin:0 0 7px}.do h3{color:var(--success)}.dont h3{color:var(--danger)}.do ul,.dont ul{margin:0;padding-left:17px;color:var(--text-secondary);line-height:1.7;font-size:11px}
  </style>
</head>
<body>
<div class="app">
  <header class="titlebar">
    <span class="brand-dot"></span><span class="brand">Gravuresse</span><span class="version">v2.4.0 / vNext v0.5.1</span>
    <div class="crumb"><strong id="crumbTitle">当前创作记录</strong><span>/</span><span id="crumbText">浅色默认 · 精致组件</span></div>
    <div class="top-spacer"></div><span class="top-chip" id="saveChip">● 自动保存</span><span class="top-chip" id="themeChip">浅色</span><span class="top-chip" id="langChip">中文</span><button class="window-btn">—</button><button class="window-btn">□</button><button class="window-btn">×</button>
  </header>
  <div id="mount"></div>
</div>
<script>
const mount=document.getElementById('mount');
const crumbTitle=document.getElementById('crumbTitle');
const crumbText=document.getElementById('crumbText');
const themeChip=document.getElementById('themeChip');
const langChip=document.getElementById('langChip');
const saveChip=document.getElementById('saveChip');
function setMeta(title,text,theme='light',lang='zh'){
  document.documentElement.dataset.theme=theme;
  crumbTitle.textContent=title;
  crumbText.textContent=text;
  themeChip.textContent=theme==='dark'?'深色':'浅色';
  langChip.textContent=lang==='en'?'English':'中文';
  saveChip.textContent=lang==='en'?'● Saved':'● 自动保存';
}
function rail(active='gen',en=false){const labels=en?{gen:'Gen',video:'Vid',conn:'Conn',set:'Set'}:{gen:'生',video:'视',conn:'连',set:'设'};return `<nav class="rail"><div class="rail-btn ${active==='gen'?'active':''}">${labels.gen}</div><div class="rail-btn ${active==='video'?'active':''}">${labels.video}</div><div class="rail-btn ${active==='conn'?'active':''}">${labels.conn}</div><div class="rail-spacer"></div><div class="rail-btn ghost">${labels.set}</div></nav>`}
function convList(en=false){return `<div class="conv-list"><div class="conv active"><div class="conv-title">${en?'Rainy City Character Study':'雨夜城市角色探索'}</div><div class="conv-meta"><span>14 ${en?'msgs':'消息'}</span><span>9 ${en?'assets':'素材'}</span><span>${en?'now':'刚刚'}</span></div></div><div class="conv"><div class="conv-title">${en?'Product poster still life':'产品海报静物'}</div><div class="conv-meta"><span>8 ${en?'msgs':'消息'}</span><span>6 ${en?'assets':'素材'}</span><span>${en?'yesterday':'昨天'}</span></div></div><div class="conv"><div class="conv-title">${en?'Short film storyboard mood':'短片分镜氛围'}</div><div class="conv-meta"><span>21 ${en?'msgs':'消息'}</span><span>13 ${en?'assets':'素材'}</span><span>${en?'Tue':'周二'}</span></div></div></div>`}
function chatPane(en=false){return `<section class="chat-pane"><div class="pane-head"><strong>${en?'Creation Record':'创作记录'}</strong><span class="pill success">${en?'Saved':'已保存'}</span><div class="head-actions"><button class="btn">${en?'Import':'导入'}</button><button class="btn primary">+ ${en?'New':'新建'}</button></div></div>${convList(en)}<div class="chat-scroll"><div class="msg user"><p>${en?'Create a rainy night city character concept. Keep the red umbrella and reflective street.':'做一组雨夜城市里的角色概念图，主角撑红伞，街面有反光。'}</p></div><div class="msg"><strong>${en?'Assistant':'助手'}</strong><p>${en?'I will generate 3 candidates with the current image connection, and save prompt, model and references into each asset detail.':'我会按当前图像连接生成 3 张候选，并把 prompt、模型和参考素材写入每张作品的生成说明。'}</p><div class="task-inline"><div class="inline-row"><span>${en?'Image generation · 3 candidates':'图像生成 · 3 张候选'}</span><span class="pill success">${en?'Done':'完成'}</span></div><div class="inline-row"><span>${en?'Added to assets':'自动加入素材区'}</span><span>${en?'Saved':'已保存'}</span></div></div></div><div class="msg user"><p>${en?'The second one is best. Keep the camera angle and change rain into mist.':'第二张最好。保留红伞和低机位，把雨改成薄雾，灯光自然一点。'}</p></div><div class="msg"><strong>${en?'Assistant':'助手'}</strong><p>${en?'Candidate 02 is selected. Continue from it or turn it into a video.':'已选中第二张。可以直接作为参考继续生成，也可以从这张图继续做视频。'}</p></div></div><div class="composer"><div class="composer-box"><textarea>${en?'Describe next step: keep composition, make the mist softer...':'描述下一步：保留构图，把雨改成薄雾，人物表情更安静…'}</textarea><button class="btn primary">${en?'Send':'发送'}</button><div class="composer-note"><span>${en?'Will include:':'本轮会带上：'}</span><span class="pill">${en?'selected asset':'选中素材'}</span><span class="pill">2 ${en?'references':'张参考图'}</span><span class="pill">image-vivid · 16:9</span></div></div></div></section>`}
function detailPane(en=false){return `<aside class="detail-pane"><div class="pane-head"><strong>${en?'Asset Detail':'素材详情'}</strong><span class="muted">${en?'Selected':'选中作品'}</span></div><div class="detail-scroll"><div class="preview"><div class="art art-city"></div></div><div class="section"><h3>${en?'Generation Note':'生成说明'}</h3><div class="section-body"><div class="kv"><span>Prompt</span><span>${en?'rainy city, red umbrella, cinematic, wet street':'雨夜城市、红伞、电影感、湿润街面'}</span></div><div class="kv"><span>${en?'Model':'模型'}</span><span>image-vivid · custom-image</span></div><div class="kv"><span>${en?'Ratio':'比例'}</span><span>16:9 · HD</span></div><div class="kv"><span>${en?'Parent':'父素材'}</span><span>${en?'none, first generation':'无，首轮生成'}</span></div><div class="kv"><span>${en?'Refs':'参考'}</span><span>2 ${en?'reference images':'张参考图'}</span></div></div></div><div class="section"><h3>${en?'Continue':'继续创作'}</h3><div class="section-body action-stack"><button class="btn primary">${en?'Use as reference':'作为参考继续生成'}</button><button class="btn">${en?'Generate video':'生成视频'}</button><button class="btn">${en?'Save to disk':'保存到本地'}</button></div></div></div></aside>`}
function canvas(en=false){return `<section class="workspace"><div class="work-head"><div class="work-title"><h1>${en?'Rainy City Character Study':'雨夜城市角色探索'}</h1><p>${en?'Current record stores messages, tasks and assets.':'当前创作记录保存消息、任务和素材；不需要新增复杂平台结构。'}</p></div><div class="work-actions"><span class="pill success">${en?'Saved':'消息已保存'}</span><span class="pill warn">9 ${en?'assets':'素材'}</span><button class="btn">${en?'Export':'导出记录'}</button></div></div><div class="canvas-layout"><div class="canvas-main"><div class="toolbar"><button class="btn">${en?'Grid':'网格'}</button><button class="btn">${en?'Free':'自由'}</button><button class="btn">${en?'Import':'导入素材'}</button><button class="btn">${en?'Materials':'素材'}</button><button class="btn">${en?'Actions':'批量动作'}</button><span class="spacer"></span><span class="pill">4 ${en?'visible':'个资产'}</span></div><div class="asset-grid"><div class="asset-card selected"><div class="badge primary">${en?'Selected':'已选中'}</div><div class="art art-city"></div><div class="card-info"><strong>${en?'Candidate 02 · Red umbrella street':'候选 02 · 红伞街景'}</strong><span>image-vivid · 16:9 · ${en?'has generation note':'有生成说明'}</span></div></div><div class="asset-card"><div class="badge">${en?'Reference':'参考图'}</div><div class="art art-portrait"></div><div class="card-info"><strong>${en?'Character reference':'角色参考'}</strong><span>${en?'Local material · usable as reference':'本地素材 · 可作为提示参考'}</span></div></div><div class="asset-card"><div class="badge">${en?'Video':'视频'}</div><div class="art art-video"></div><div class="card-info"><strong>${en?'Shot test 01':'镜头测试 01'}</strong><span>5s · ${en?'from candidate 02':'从候选 02 生成'}</span></div></div><div class="asset-card"><div class="badge">${en?'Material':'素材'}</div><div class="art art-ref"></div><div class="card-info"><strong>${en?'Neon color reference':'霓虹色彩参考'}</strong><span>${en?'Imported · no secrets stored':'导入素材 · 未写入密钥'}</span></div></div></div></div>${detailPane(en)}</div></section>`}
function workspace(){setMeta('当前创作记录','浅色默认 · 精致组件');mount.className='shell';mount.innerHTML=rail('gen')+chatPane(false)+canvas(false)}
function detail(){setMeta('素材详情','继续创作入口');mount.className='shell';mount.innerHTML=rail('gen')+chatPane(false)+`<section class="workspace"><div class="work-head"><div class="work-title"><h1>候选 02 · 红伞街景</h1><p>素材详情解释作品怎么来的，并给出下一步动作。</p></div><div class="work-actions"><button class="btn">复制说明</button><button class="btn primary">作为参考继续生成</button></div></div><div class="big-area"><section class="big-preview"><div class="big-art"><div class="art art-city"></div></div><div class="big-meta"><div><h2>选中素材：红伞街景</h2><p>当前创作记录内保存；可继续生成图像或直接发起视频任务。</p></div><span class="pill success" style="margin-left:auto">已保存</span><span class="pill warn">可继续创作</span></div></section>${detailPane(false)}</div></section>`}
function recovery(){setMeta('视频任务','重启恢复策略');mount.className='shell';mount.innerHTML=rail('video')+chatPane(false)+`<section class="workspace"><div class="work-head"><div class="work-title"><h1>视频任务恢复</h1><p>只做最小可靠恢复：有信息就继续轮询，不确定就明确告诉用户。</p></div><div class="work-actions"><span class="pill warn">1 条运行中</span><span class="pill danger">1 条需检查</span><button class="btn primary">重新查询状态</button></div></div><div class="task-board"><section class="section"><h3>任务队列</h3><div class="queue-list"><div class="queue-item"><div class="queue-thumb"><div class="art art-video"></div></div><div><h3>从候选 02 生成视频</h3><p>已恢复连接，继续轮询；不会依赖上次内存里的回调。</p><div class="progress"><div class="bar" style="width:42%"></div></div></div><span class="pill warn">运行中 42%</span></div><div class="queue-item"><div class="queue-thumb"><div class="art art-city"></div></div><div><h3>旧视频任务</h3><p>连接缺失，远程状态未知；保留 taskId，不伪造成失败。</p><div class="progress"><div class="bar danger" style="width:100%"></div></div></div><span class="pill danger">需手动检查</span></div><div class="queue-item"><div class="queue-thumb"><div class="art art-ref"></div></div><div><h3>镜头测试 01</h3><p>已完成并写入素材区，保留父素材和生成说明。</p><div class="progress"><div class="bar success" style="width:100%"></div></div></div><span class="pill success">完成</span></div></div></section><aside style="display:grid;align-content:start;gap:11px"><div class="rule"><strong>恢复规则 1</strong><p>拿到远程 taskId 后立即写入当前记录，重启后可重新解析连接。</p></div><div class="rule"><strong>恢复规则 2</strong><p>连接不存在时显示“需手动检查”，不自动重提，避免重复计费。</p></div><div class="rule"><strong>恢复规则 3</strong><p>重试会创建新任务，旧错误和旧 taskId 保留，方便追查。</p></div></aside></div></section>`}
function settings(){setMeta('设置','主题 · 语言 · Provider');mount.className='shell';mount.innerHTML=rail('conn')+chatPane(false)+canvas(false)+`<div class="settings-backdrop"><div class="settings-modal"><div class="settings-top"><strong>提供商设置</strong><span class="pill success">通用偏好即时保存</span><span style="margin-left:auto" class="muted">Esc 关闭</span></div><div class="settings-general"><div class="pref"><label>语言</label><select><option>中文</option><option>English</option></select></div><div class="pref"><label>主题</label><select><option>浅色</option><option>深色</option><option>跟随系统</option></select></div><div class="pref"><label>字号</label><select><option>小</option><option selected>中</option><option>大</option></select></div><div class="pref"><label>参考图</label><div class="toggle"><span>启用参考图</span><span class="pill success">开</span></div></div><div class="pref"><label>视频工作区</label><div class="toggle"><span>显示视频入口</span><span class="pill warn">实验</span></div></div><div class="pref"><label>自动保存</label><div class="toggle"><span>保存创作历史</span><span class="pill success">开</span></div></div></div><div class="settings-main"><aside class="settings-nav"><div class="nav-title">提供商设置</div><div class="nav-item active">账号</div><div class="nav-item">API 密钥</div><div class="nav-item">自定义（中转）</div><div class="nav-item">默认模型搭配</div></aside><main class="settings-content"><h2 style="margin:0 0 6px;font-size:18px;letter-spacing:-.03em">账号</h2><p class="muted" style="margin:0 0 14px">账号、API Key 和自定义中转仍在同一设置体系里；密钥不回显。</p><div class="account-list"><div class="account-row"><div class="provider-icon">O</div><div><strong>OpenAI Codex</strong><p class="muted" style="margin:4px 0 0">设备码 · 需要自有 OAuth 客户端注册信息</p></div><span class="pill warn">待官方注册</span></div><div class="account-row"><div class="provider-icon">X</div><div><strong>xAI OAuth</strong><p class="muted" style="margin:4px 0 0">浏览器 OAuth · 不复用第三方客户端身份</p></div><span class="pill warn">待官方注册</span></div><div class="account-row"><div class="provider-icon">Q</div><div><strong>Qwen OAuth</strong><p class="muted" style="margin:4px 0 0">浏览器 OAuth · 当前未写入任何凭据</p></div><span class="pill warn">待官方注册</span></div></div></main></div></div></div>`}
function dark(){setMeta('Current Workspace','Dark theme · English preview','dark','en');mount.className='shell';mount.innerHTML=rail('gen',true)+chatPane(true)+canvas(true)}
function spec(){setMeta('UI 规范板','精致组件 · 布局 · 主题');mount.className='shell full';mount.innerHTML=rail('gen')+`<main class="workspace"><div class="work-head"><div class="work-title"><h1>Gravuresse v0.5.1 UI 规范</h1><p>当前架构优先：组件更精致、浅色默认、深色同构、中文/英文。</p></div><div class="work-actions"><span class="pill success">Refined components</span><span class="pill warn">Dark theme</span><span class="pill">i18n</span></div></div><div class="spec-board"><section class="spec-card" style="grid-column:1/-1"><h2>设计原则</h2><p>不推翻现有简洁架构。默认仍是模块栏 + 聊天 + 素材/画布 + 素材详情；优化创作流程、组件质感、主题和语言。</p></section><section class="spec-card"><h2>桌面布局</h2><div class="layout-mini"><div>56<br>模块</div><div>Chat<br>360–420</div><div>Canvas<br>flex</div><div>Detail<br>300–340</div></div></section><section class="spec-card"><h2>Light Token</h2><div class="tokens"><div class="token t1">workspace</div><div class="token t2">primary</div><div class="token t3">elevated</div><div class="token t4">accent</div><div class="token t5">success</div><div class="token t6">danger</div></div></section><section class="spec-card"><h2>Dark Token</h2><div class="tokens"><div class="token t7">workspace</div><div class="token t8">primary</div><div class="token t9">elevated</div><div class="token t10">accent</div><div class="token t11">success</div><div class="token t12">danger</div></div></section><section class="spec-card"><h2>组件样例</h2><div class="component-grid"><button class="btn primary">作为参考继续生成</button><button class="btn">生成视频</button><span class="pill success">已保存</span><span class="pill danger">需手动检查</span><div class="composer-box" style="grid-column:1/-1"><textarea>输入栏显示当前参考、模型和参数摘要…</textarea><button class="btn primary">发送</button></div></div></section><section class="spec-card"><h2>精致组件规则</h2><p>按钮有主次和焦点；卡片有缩略图、状态和选中态；输入框要解释本轮会带上的参考；状态标签必须有文字。</p></section><section class="spec-card" style="grid-column:1/-1"><h2>Do / Don’t</h2><div class="do-grid"><div class="do"><h3>Do</h3><ul><li>保留当前简洁架构</li><li>用 token 管理半径、阴影、状态色</li><li>优化真实创作流程</li><li>同构支持浅色 / 深色 / 中英文</li></ul></div><div class="dont"><h3>Don’t</h3><ul><li>不新增一整套平台结构</li><li>不为了视觉效果牺牲可读性</li><li>不只靠颜色表达状态</li><li>不把深色做成另一套产品</li></ul></div></div></section></div></main>`}
const views={workspace,detail,recovery,settings,dark,spec};
const screen=new URLSearchParams(location.search).get('screen')||'workspace';
(views[screen]||workspace)();
</script>
</body>
</html>
