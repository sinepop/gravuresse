<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravuresse vNext v0.4 Architecture-First Prototype</title>
  <style>
    :root {
      --bg: #0B0D10;
      --bg2: #101318;
      --title: #0D1013;
      --panel: #171B20;
      --panel2: #1E232A;
      --hover: #252B33;
      --line: #2A3038;
      --line2: #3A424D;
      --text: #F4F5F7;
      --sub: #B6BDC7;
      --muted: #7F8894;
      --amber: #F0A44B;
      --amber2: #FFB65E;
      --amberSoft: rgba(240,164,75,.13);
      --green: #45B97C;
      --greenSoft: rgba(69,185,124,.13);
      --blue: #70A5EB;
      --blueSoft: rgba(112,165,235,.13);
      --red: #E96B68;
      --redSoft: rgba(233,107,104,.13);
      --font: "Segoe UI Variable", "Microsoft YaHei UI", "PingFang SC", system-ui, sans-serif;
      --mono: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      --r-xs: 4px;
      --r-sm: 6px;
      --r: 8px;
      --r-lg: 12px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font: 13px/1.45 var(--font); }
    button, textarea, input { font: inherit; }
    .app { width: 100vw; height: 100vh; display: grid; grid-template-rows: 40px 1fr 30px; background: var(--bg); }
    .titlebar { display: flex; align-items: center; gap: 12px; height: 40px; background: var(--title); border-bottom: 1px solid var(--line); padding-right: 12px; }
    .brand { width: 56px; height: 40px; display: grid; place-items: center; color: var(--amber); font-weight: 760; font-size: 16px; letter-spacing: -.04em; }
    .crumb { display: flex; gap: 8px; align-items: center; min-width: 520px; color: var(--muted); }
    .crumb strong { color: var(--text); font-weight: 650; }
    .top-right { margin-left: auto; display: flex; align-items: center; gap: 8px; color: var(--sub); font-size: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--green); box-shadow: 0 0 0 3px var(--greenSoft); }
    .shell { min-height: 0; display: grid; grid-template-columns: 56px 288px minmax(570px, 1fr) 332px; }
    .shell.no-inspector { grid-template-columns: 56px 288px minmax(860px, 1fr); }
    .shell.connections { grid-template-columns: 56px minmax(860px, 1fr); }
    .shell.spec { grid-template-columns: 56px minmax(960px, 1fr); }
    .rail { background: var(--title); border-right: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 8px; }
    .rail-btn { width: 36px; height: 36px; display: grid; place-items: center; border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--muted); font-weight: 700; }
    .rail-btn.active { background: var(--amber); color: #121212; }
    .rail-btn.ghost { background: var(--panel2); border-color: var(--line); color: var(--sub); }
    .rail-spacer { flex: 1; }
    .side, .inspector { min-width: 0; background: var(--panel); display: flex; flex-direction: column; }
    .side { border-right: 1px solid var(--line); }
    .inspector { border-left: 1px solid var(--line); }
    .panel-head { height: 50px; flex: 0 0 auto; display: flex; align-items: center; padding: 0 14px; border-bottom: 1px solid var(--line); }
    .panel-head strong { font-size: 13px; font-weight: 650; }
    .panel-head span { margin-left: auto; color: var(--muted); font-size: 11px; }
    .main { min-width: 0; min-height: 0; position: relative; overflow: hidden; background: var(--bg); }
    .screen { position: absolute; inset: 0; display: none; }
    .screen.active { display: flex; flex-direction: column; }
    .footer { height: 30px; display: flex; align-items: center; gap: 14px; padding: 0 12px; background: var(--title); border-top: 1px solid var(--line); color: var(--muted); font-size: 11px; }
    .footer b { color: var(--sub); }
    .pill { display: inline-flex; align-items: center; gap: 5px; height: 22px; padding: 0 8px; border-radius: 999px; border: 1px solid var(--line); background: var(--panel2); color: var(--sub); font-size: 11px; white-space: nowrap; }
    .pill.amber { color: var(--amber); border-color: rgba(240,164,75,.38); background: var(--amberSoft); }
    .pill.green { color: var(--green); border-color: rgba(69,185,124,.34); background: var(--greenSoft); }
    .pill.blue { color: var(--blue); border-color: rgba(112,165,235,.34); background: var(--blueSoft); }
    .pill.red { color: var(--red); border-color: rgba(233,107,104,.34); background: var(--redSoft); }
    .btn { height: 34px; padding: 0 12px; border-radius: var(--r-sm); border: 1px solid var(--line2); background: var(--panel2); color: var(--text); }
    .btn.primary { border: 0; background: var(--amber); color: #111; font-weight: 760; }
    .btn.red { color: var(--red); border-color: rgba(233,107,104,.35); background: var(--redSoft); }
    .small { height: 28px; padding: 0 9px; border-radius: var(--r-sm); border: 1px solid var(--line); background: var(--panel2); color: var(--sub); font-size: 11px; }
    .muted { color: var(--muted); }
    .mono { font-family: var(--mono); }

    /* Side */
    .record-tools { padding: 12px; border-bottom: 1px solid var(--line); display: grid; gap: 10px; }
    .search { height: 34px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); color: var(--muted); display: flex; align-items: center; padding: 0 10px; }
    .record-list { padding: 8px; display: grid; gap: 5px; }
    .record { padding: 10px; border: 1px solid transparent; border-radius: var(--r); color: var(--sub); }
    .record.active { background: var(--panel2); border-color: var(--line2); color: var(--text); box-shadow: inset 2px 0 0 var(--amber); }
    .record-title { display: flex; align-items: center; gap: 6px; font-weight: 620; }
    .record-meta { margin-top: 6px; display: flex; gap: 8px; color: var(--muted); font-size: 11px; }
    .task-card { margin: auto 12px 12px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); overflow: hidden; }
    .task-card h3 { margin: 0; height: 40px; padding: 0 11px; display: flex; align-items: center; border-bottom: 1px solid var(--line); font-size: 12px; }
    .task-row { display: grid; grid-template-columns: 9px 1fr auto; gap: 8px; align-items: center; padding: 10px 11px; border-bottom: 1px solid var(--line); color: var(--sub); font-size: 11px; }
    .task-row:last-child { border-bottom: 0; }
    .task-row .led { width: 8px; height: 8px; border-radius: 999px; background: var(--amber); box-shadow: 0 0 0 3px var(--amberSoft); }
    .task-row.done .led { background: var(--green); box-shadow: 0 0 0 3px var(--greenSoft); }
    .task-row.warn .led { background: var(--red); box-shadow: 0 0 0 3px var(--redSoft); }

    /* Workspace */
    .work-top { height: 58px; flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 0 16px; background: #0D1013; border-bottom: 1px solid var(--line); }
    .work-top h1 { margin: 0; font-size: 17px; line-height: 1.15; letter-spacing: -.02em; }
    .work-top p { margin: 4px 0 0; color: var(--muted); font-size: 11px; }
    .work-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .workspace { min-height: 0; flex: 1; display: grid; grid-template-columns: 410px minmax(360px, 1fr); }
    .chat { min-width: 0; min-height: 0; border-right: 1px solid var(--line); display: flex; flex-direction: column; background: var(--bg2); }
    .chat-scroll { flex: 1; min-height: 0; overflow: hidden; padding: 14px; display: grid; align-content: start; gap: 12px; }
    .msg { max-width: 94%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); color: var(--sub); }
    .msg.user { justify-self: end; background: #20262D; color: var(--text); }
    .msg strong { display: block; margin-bottom: 6px; color: var(--text); font-size: 12px; }
    .msg p { margin: 0; line-height: 1.55; }
    .task-inline { margin-top: 10px; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; background: var(--bg); }
    .inline-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; padding: 9px 10px; border-bottom: 1px solid var(--line); font-size: 11px; color: var(--sub); }
    .inline-row:last-child { border-bottom: 0; }
    .composer { flex: 0 0 auto; padding: 10px 12px; border-top: 1px solid var(--line); background: var(--panel); }
    .composer-box { min-height: 56px; display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 8px; border: 1px solid var(--line2); border-radius: var(--r); background: var(--bg); }
    .composer-box textarea { resize: none; width: 100%; height: 38px; border: 0; outline: 0; background: transparent; color: var(--text); }
    .composer-note { grid-column: 1 / -1; color: var(--muted); font-size: 10px; }
    .assets { min-width: 0; min-height: 0; display: flex; flex-direction: column; }
    .asset-toolbar { height: 50px; flex: 0 0 auto; display: flex; align-items: center; gap: 8px; padding: 0 14px; border-bottom: 1px solid var(--line); background: var(--bg); }
    .asset-grid { min-height: 0; flex: 1; overflow: hidden; padding: 14px; display: grid; grid-template-columns: repeat(2, minmax(180px,1fr)); grid-auto-rows: 216px; gap: 12px; }
    .asset-card { position: relative; overflow: hidden; border: 1px solid var(--line); border-radius: var(--r); background: var(--panel); }
    .asset-card.selected { border-color: var(--amber); box-shadow: 0 0 0 1px rgba(240,164,75,.2); }
    .art { height: 150px; position: relative; overflow: hidden; background: #141414; }
    .art::before, .art::after { content: ""; position: absolute; inset: 0; }
    .art-city::before { background: radial-gradient(circle at 70% 18%, rgba(240,164,75,.8), transparent 10%), linear-gradient(160deg, #25212a 0%, #10141a 46%, #08090b 100%); }
    .art-city::after { background: linear-gradient(90deg, transparent 0 14%, rgba(255,255,255,.08) 14% 15%, transparent 15% 30%, rgba(255,255,255,.05) 30% 31%, transparent 31%), linear-gradient(0deg, #0a0a0b 0 20%, transparent 20%); clip-path: polygon(0 46%, 12% 42%, 16% 28%, 28% 35%, 33% 18%, 45% 32%, 52% 24%, 66% 38%, 73% 19%, 91% 44%, 100% 36%, 100% 100%, 0 100%); }
    .art-portrait::before { background: radial-gradient(circle at 52% 34%, #e8c9a0 0 11%, transparent 12%), radial-gradient(circle at 50% 68%, #6b3d2d 0 18%, transparent 19%), linear-gradient(145deg, #20242d, #0f1114); }
    .art-portrait::after { background: radial-gradient(circle at 50% 32%, transparent 0 10%, #322118 11% 13%, transparent 14%), linear-gradient(90deg, transparent 0 36%, #c0392b 36% 64%, transparent 64%); opacity: .8; }
    .art-video::before { background: linear-gradient(145deg, #14202a, #080b0e), radial-gradient(circle at 76% 20%, var(--amber), transparent 10%); }
    .art-video::after { background: linear-gradient(90deg, transparent 0 8%, rgba(255,255,255,.06) 8% 9%, transparent 9% 18%); clip-path: polygon(0 56%, 20% 44%, 34% 51%, 52% 35%, 72% 52%, 100% 40%, 100% 100%, 0 100%); }
    .art-ref::before { background: linear-gradient(145deg, #30251d, #101318), radial-gradient(circle at 32% 28%, #e8a849, transparent 14%); }
    .card-info { padding: 10px; }
    .card-info strong { display: block; font-size: 12px; }
    .card-info span { display: block; margin-top: 4px; color: var(--muted); font-size: 10px; }
    .card-badge { position: absolute; top: 8px; left: 8px; height: 23px; display: grid; place-items: center; padding: 0 8px; border-radius: 5px; background: rgba(13,16,19,.86); color: var(--sub); font-size: 10px; }
    .card-badge.amber { background: var(--amber); color: #111; font-weight: 760; }

    /* Inspector */
    .inspect-scroll { min-height: 0; flex: 1; overflow: hidden; padding: 14px; display: grid; align-content: start; gap: 12px; }
    .preview { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; background: var(--bg); }
    .preview .art { height: 178px; }
    .section { border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); overflow: hidden; }
    .section h3 { margin: 0; height: 38px; display: flex; align-items: center; padding: 0 11px; border-bottom: 1px solid var(--line); font-size: 12px; }
    .section-body { padding: 11px; color: var(--sub); }
    .kv { display: grid; grid-template-columns: 86px 1fr; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 11px; }
    .kv:last-child { border-bottom: 0; }
    .kv span:first-child { color: var(--muted); }
    .action-stack { display: grid; gap: 8px; }

    /* Asset detail screen */
    .detail-main { min-height: 0; flex: 1; padding: 14px; overflow: hidden; }
    .big-preview { height: 100%; border: 1px solid var(--line); border-radius: var(--r); background: var(--panel); overflow: hidden; display: flex; flex-direction: column; }
    .big-art { flex: 1; min-height: 0; padding: 18px; display: grid; place-items: center; background: var(--bg); }
    .big-art .art { width: min(760px, 100%); height: min(500px, 70vh); border: 1px solid var(--line); border-radius: var(--r); }
    .big-meta { min-height: 72px; display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-top: 1px solid var(--line); }
    .big-meta h2 { margin: 0; font-size: 15px; }
    .big-meta p { margin: 4px 0 0; color: var(--muted); font-size: 11px; }
    .detail-tabs { display: flex; gap: 6px; padding: 10px; border-bottom: 1px solid var(--line); }
    .tab { height: 30px; padding: 0 10px; border: 1px solid var(--line); border-radius: var(--r-sm); background: var(--bg); color: var(--muted); font-size: 11px; }
    .tab.active { background: var(--amberSoft); border-color: rgba(240,164,75,.4); color: var(--amber); }
    .prompt-box { padding: 11px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); color: var(--sub); line-height: 1.55; }

    /* Recovery */
    .recovery-body { min-height: 0; flex: 1; padding: 16px; display: grid; grid-template-columns: minmax(540px,1fr) 340px; gap: 14px; overflow: hidden; }
    .queue-panel, .recovery-panel { border: 1px solid var(--line); border-radius: var(--r); background: var(--panel); overflow: hidden; }
    .queue-list { padding: 12px; display: grid; gap: 10px; }
    .queue-item { display: grid; grid-template-columns: 70px 1fr auto; gap: 12px; align-items: center; padding: 12px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); }
    .queue-thumb { height: 52px; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
    .queue-thumb .art { height: 100%; }
    .queue-item h3 { margin: 0; font-size: 13px; }
    .queue-item p { margin: 5px 0 0; color: var(--muted); font-size: 11px; }
    .progress { margin-top: 8px; height: 5px; border-radius: 999px; background: var(--line); overflow: hidden; }
    .bar { height: 100%; background: var(--amber); border-radius: inherit; }
    .bar.green { background: var(--green); }
    .bar.red { background: var(--red); }
    .recovery-panel { padding: 14px; display: grid; align-content: start; gap: 12px; }
    .rule { padding: 12px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); }
    .rule strong { display: block; font-size: 12px; }
    .rule p { margin: 6px 0 0; color: var(--muted); font-size: 11px; line-height: 1.5; }

    /* Connections */
    .connections-page { min-height: 0; flex: 1; overflow: hidden; padding: 18px; display: grid; grid-template-columns: 1fr 330px; gap: 14px; }
    .conn-main, .conn-side { border: 1px solid var(--line); border-radius: var(--r); background: var(--panel); overflow: hidden; }
    .conn-head { height: 54px; display: flex; align-items: center; gap: 10px; padding: 0 14px; border-bottom: 1px solid var(--line); }
    .conn-head h2 { margin: 0; font-size: 15px; }
    .conn-head .btn { margin-left: auto; }
    .conn-list { padding: 12px; display: grid; gap: 10px; }
    .conn-row { min-height: 76px; display: grid; grid-template-columns: 44px 1fr auto; gap: 12px; align-items: center; padding: 12px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); }
    .conn-icon { width: 40px; height: 40px; display: grid; place-items: center; border: 1px solid var(--line2); border-radius: 9px; color: var(--amber); font-weight: 800; }
    .conn-row h3 { margin: 0; font-size: 13px; }
    .conn-row p { margin: 5px 0 0; color: var(--muted); font-size: 11px; }
    .caps { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .add-flow { padding: 12px; display: grid; gap: 10px; }
    .add-card { padding: 13px; border: 1px solid var(--line); border-radius: var(--r); background: var(--bg); }
    .add-card.active { border-color: rgba(240,164,75,.45); background: var(--amberSoft); }
    .add-card strong { display: block; font-size: 12px; }
    .add-card span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; }
    .technical { margin: 12px; padding: 12px; border: 1px dashed var(--line2); border-radius: var(--r); color: var(--muted); font-size: 11px; line-height: 1.55; }

    /* Spec */
    .spec-board { flex: 1; overflow: hidden; padding: 18px; display: grid; grid-template-columns: 1.15fr .85fr; grid-template-rows: auto auto 1fr; gap: 12px; }
    .spec-card { border: 1px solid var(--line); border-radius: var(--r); background: var(--panel); padding: 14px; overflow: hidden; }
    .spec-card h2 { margin: 0 0 10px; font-size: 15px; }
    .spec-card p { margin: 0; color: var(--muted); line-height: 1.55; }
    .tokens { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    .token { height: 70px; border: 1px solid var(--line); border-radius: var(--r); padding: 8px; display: flex; flex-direction: column; justify-content: end; font-size: 10px; color: var(--sub); }
    .t-bg { background: #0B0D10; } .t-panel { background: #171B20; } .t-raised { background: #1E232A; } .t-amber { background: #F0A44B; color:#111; } .t-green { background:#45B97C;color:#111; } .t-red{background:#E96B68;color:#111;}
    .layout-mini { display: grid; grid-template-columns: 56px 180px 1fr 180px; height: 104px; border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
    .layout-mini div { display: grid; place-items: center; border-right: 1px solid var(--line); color: var(--muted); font-size: 11px; line-height: 1.35; text-align: center; }
    .layout-mini div:last-child { border-right: 0; }
    .component-grid { display: grid; grid-template-columns: repeat(2, minmax(210px, 1fr)); gap: 10px; }
    .do-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .do, .dont { padding: 12px; border-radius: var(--r); border: 1px solid var(--line); background: var(--bg); }
    .do h3, .dont h3 { margin: 0 0 8px; font-size: 13px; }
    .do h3 { color: var(--green); } .dont h3 { color: var(--red); }
    .do ul, .dont ul { margin: 0; padding-left: 17px; color: var(--sub); line-height: 1.8; font-size: 11px; }
    .type-sample h1 { margin: 0; font-size: 27px; letter-spacing: -.04em; }
    .type-sample h2 { margin: 8px 0 0; font-size: 17px; }
    .type-sample p { margin-top: 8px; }
  </style>
</head>
<body>
<div class="app">
  <header class="titlebar">
    <div class="brand">G</div>
    <div class="crumb"><strong>Gravuresse</strong><span>/</span><span id="crumbText">v0.4 当前创作记录</span></div>
    <div class="top-right"><span class="dot"></span><span>自动保存完成</span><span class="pill">本地优先</span></div>
  </header>
  <div id="mount"></div>
  <footer class="footer"><b>v0.4 门禁</b><span>当前会话就是工作空间</span><span>素材详情解释“怎么来的”</span><span>画布只负责整理素材</span></footer>
</div>

<template id="railTpl">
  <nav class="rail">
    <div class="rail-btn active">创</div>
    <div class="rail-btn">素</div>
    <div class="rail-btn">任</div>
    <div class="rail-btn">连</div>
    <div class="rail-spacer"></div>
    <div class="rail-btn ghost">设</div>
  </nav>
</template>

<template id="sideTpl">
  <aside class="side">
    <div class="panel-head"><strong>创作记录</strong><span>4 条</span></div>
    <div class="record-tools"><div class="search">搜索当前记录 / 素材说明</div><button class="btn primary">+ 新建创作记录</button></div>
    <div class="record-list">
      <div class="record active"><div class="record-title">雨夜城市角色探索</div><div class="record-meta"><span>14 消息</span><span>9 素材</span><span>刚刚</span></div></div>
      <div class="record"><div class="record-title">产品海报静物</div><div class="record-meta"><span>8 消息</span><span>6 素材</span><span>昨天</span></div></div>
      <div class="record"><div class="record-title">短片分镜氛围</div><div class="record-meta"><span>21 消息</span><span>13 素材</span><span>周二</span></div></div>
    </div>
    <div class="task-card">
      <h3>进行中的任务</h3>
      <div class="task-row done"><span class="led"></span><span>图像候选已完成</span><span>3 张</span></div>
      <div class="task-row"><span class="led"></span><span>视频生成轮询中</span><span>42%</span></div>
      <div class="task-row warn"><span class="led"></span><span>旧任务需手动检查</span><span>1 条</span></div>
    </div>
  </aside>
</template>

<script>
const mount = document.getElementById('mount');
const rail = () => document.getElementById('railTpl').innerHTML;
const side = () => document.getElementById('sideTpl').innerHTML;

function inspectorDefault() {
  return `<aside class="inspector">
    <div class="panel-head"><strong>素材详情</strong><span>选中作品</span></div>
    <div class="inspect-scroll">
      <div class="preview"><div class="art art-city"></div></div>
      <div class="section"><h3>生成说明</h3><div class="section-body">
        <div class="kv"><span>提示词</span><span>雨夜城市、红伞、电影感、湿润街面</span></div>
        <div class="kv"><span>模型</span><span>我的图像连接 · image-vivid</span></div>
