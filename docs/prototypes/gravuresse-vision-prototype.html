    *{box-sizing:border-box}body{margin:0;min-height:100vh}.app{height:100vh;display:grid;grid-template-rows:48px 1fr}.title{display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--panel),transparent 4%);backdrop-filter:blur(18px)}.brand{font-weight:760;letter-spacing:.01em}.badge{font-size:11px;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);border-radius:999px;padding:4px 9px}.status{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}.shell{display:grid;grid-template-columns:60px 390px 1fr;min-height:0}.rail{border-right:1px solid var(--line);background:var(--panel-2);padding:12px 8px;display:flex;flex-direction:column;gap:10px}.rail button{height:42px;border:1px solid transparent;background:transparent;border-radius:14px;color:var(--muted);font-size:18px}.rail button.on{background:var(--card);border-color:var(--line);box-shadow:var(--shadow-xs);color:var(--accent)}.side{border-right:1px solid var(--line);background:var(--panel);padding:18px;display:flex;flex-direction:column;gap:14px;min-width:0}.main{background:var(--bg);padding:18px;display:grid;grid-template-rows:auto 1fr;gap:14px;min-width:0}.row{display:flex;align-items:center;gap:10px}.between{display:flex;justify-content:space-between;align-items:center;gap:12px}.h1{font-size:20px;font-weight:780;letter-spacing:-.02em}.h2{font-size:14px;font-weight:720}.hint{font-size:12px;color:var(--muted);line-height:1.5}.small{font-size:11px;color:var(--faint)}.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-xs);padding:12px}.btn{height:34px;border:1px solid var(--line-2);background:var(--card);border-radius:12px;padding:0 13px;color:var(--ink);font-weight:650}.btn.primary{border-color:color-mix(in srgb,var(--accent),#000 8%);background:linear-gradient(180deg,var(--accent-2),var(--accent));color:white;box-shadow:0 8px 18px color-mix(in srgb,var(--accent),transparent 78%)}.btn.ghost{background:transparent}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--panel-2);border-radius:999px;padding:4px 8px;font-size:11px;color:var(--muted);white-space:nowrap}.pill.blue{background:var(--accent-soft);color:var(--accent);border-color:color-mix(in srgb,var(--accent),transparent 72%)}.pill.green{background:var(--green-soft);color:var(--green);border-color:color-mix(in srgb,var(--green),transparent 70%)}.pill.amber{background:var(--amber-soft);color:var(--amber);border-color:color-mix(in srgb,var(--amber),transparent 70%)}.pill.red{background:var(--red-soft);color:var(--red);border-color:color-mix(in srgb,var(--red),transparent 70%)}.pill.purple{background:var(--purple-soft);color:var(--purple);border-color:color-mix(in srgb,var(--purple),transparent 70%)}.thread{display:grid;grid-template-columns:1fr auto;gap:8px;padding:11px;border:1px solid var(--line);border-radius:14px;background:var(--card)}.thread.on{border-color:color-mix(in srgb,var(--accent),transparent 55%);box-shadow:0 0 0 3px var(--accent-soft)}.messages{display:flex;flex-direction:column;gap:10px;min-height:0;overflow:hidden}.msg{padding:11px 12px;border-radius:15px;border:1px solid var(--line);background:var(--panel-2);font-size:13px;line-height:1.5}.msg.user{background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent),transparent 70%)}.composer{margin-top:auto;border:1px solid color-mix(in srgb,var(--accent),transparent 68%);background:var(--card);border-radius:18px;padding:12px;box-shadow:0 0 0 4px var(--accent-soft),var(--shadow-xs)}.input{min-height:74px;border:0;outline:0;width:100%;background:transparent;color:var(--ink);font-size:13px;line-height:1.5}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.asset{overflow:hidden;padding:0}.thumb{height:154px;background:linear-gradient(135deg,#1e293b,#475569 45%,#f59e0b 46%,#991b1b 58%,#fde68a);position:relative}.thumb.alt{background:linear-gradient(135deg,#111827,#374151 40%,#94a3b8 41%,#e0f2fe 70%,#0f172a)}.thumb.video{background:radial-gradient(circle at 55% 40%,#fde68a 0 8%,transparent 9%),linear-gradient(135deg,#020617,#1e3a8a,#fb7185)}.thumb.canvas{background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:30px 30px;background-color:var(--panel-2)}.asset-body{padding:10px;display:flex;flex-direction:column;gap:7px}.workspace{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px;min-height:0}.detail{padding:14px;display:flex;flex-direction:column;gap:12px}.section{border:1px solid var(--line);background:var(--panel-2);border-radius:14px;padding:11px}.kv{display:grid;grid-template-columns:88px 1fr;gap:7px;font-size:12px}.kv span:nth-child(odd){color:var(--muted)}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.four{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.screen{display:none;min-height:0}.screen.active{display:grid;min-height:0}.agent-card{border-left:3px solid var(--accent);padding:12px;border-radius:14px;background:var(--card);border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.edit-row{display:grid;grid-template-columns:100px 1fr;gap:10px;align-items:start}.tag-list{display:flex;flex-wrap:wrap;gap:7px}.cap-table{display:grid;grid-template-columns:1.2fr .9fr .9fr .7fr;gap:8px;font-size:12px}.cap-table>div{padding:10px;border:1px solid var(--line);background:var(--card);border-radius:12px}.pipeline{position:relative;min-height:520px;padding:30px;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:34px 34px}.node{position:absolute;width:184px;border:1px solid var(--line-2);border-radius:16px;background:var(--card);padding:12px;box-shadow:var(--shadow)}.edge{position:absolute;height:2px;background:color-mix(in srgb,var(--accent),transparent 45%);transform-origin:left center}.canvas{position:relative;min-height:560px;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:42px 42px;background-color:var(--panel-2);border-radius:var(--r-lg);overflow:hidden}.canvas-item{position:absolute;border:1px solid var(--line);background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:10px}.line{position:absolute;height:2px;background:color-mix(in srgb,var(--purple),transparent 35%);transform-origin:left center}.spec-board{grid-template-columns:1fr;gap:12px}.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.spec-card{min-height:122px}.dark-toggle{margin-left:6px}
  </style>

<body>
<div class="app" id="app">
  <header class="title"><div class="brand">Gravuresse</div><span class="badge">v1.0 Vision Prototype</span><span class="badge">默认简单 / 高级渐进</span><div class="status"><span>Auto saved</span><span class="pill green">Context frozen</span><button class="btn ghost dark-toggle" onclick="toggleTheme()">Theme</button></div></header>
  <div class="shell">
    <nav class="rail"><button class="on">✦</button><button>◱</button><button>⌘</button><button>◇</button><button>⚙</button></nav>
    <aside class="side">
      <div class="between"><div><div class="h1">雨夜红伞短片</div><div class="hint">Project · 多 Thread 创作</div></div><span class="pill blue">recipe</span></div>
      <div class="thread on"><div><b>主画面探索</b><div class="small">角色、街景、雨雾氛围</div></div><span class="pill green">active</span></div>
      <div class="thread"><div><b>镜头与运动</b><div class="small">图转视频、推轨、慢动作</div></div><span class="pill">shared</span></div>
      <div class="thread"><div><b>服装细节</b><div class="small">红伞、风衣、背光</div></div><span class="pill">isolated</span></div>
      <div class="messages">
        <div class="msg user">我想做一个雨夜街头的红伞女性，电影感，适合后续做 5 秒视频。</div>
        <div class="msg">已整理为：雨夜、霓虹反射、红伞主视觉、35mm 中景、轻雾、背光轮廓。</div>
        <div class="msg user">保持红伞和构图，把雨变成薄雾，人物更安静一点。</div>
      </div>
      <div class="composer"><textarea class="input">继续修改选中图：保持红伞、街道透视和冷暖对比，把人物表情改得更克制。</textarea><div class="between"><div class="tag-list"><span class="pill blue">2 refs</span><span class="pill">Wan2.2 image</span><span class="pill amber">stable edit</span></div><button class="btn primary">生成候选</button></div></div>
    </aside>
    <main class="main" id="screens"></main>
  </div>
</div>
<script>
const screens={
workspace:`<section class="screen active"><div class="between"><div><div class="h1">默认创作工作区</div><div class="hint">普通用户不需要理解 Pipeline，也能从描述到生成再继续修改。</div></div><div class="row"><span class="pill blue">Chat + Assets</span><span class="pill green">3 分钟首图</span></div></div><div class="workspace"><div class="panel detail"><div class="between"><div class="h2">候选作品</div><div class="row"><button class="btn ghost">网格</button><button class="btn ghost">自由画布</button><button class="btn">导入参考</button></div></div><div class="grid"><div class="card asset"><div class="thumb"></div><div class="asset-body"><b>红伞 / 雨雾主图</b><span class="small">image · 16:9 · recipe</span><span class="pill blue">selected</span></div></div><div class="card asset"><div class="thumb alt"></div><div class="asset-body"><b>街道冷雾版本</b><span class="small">image · parent A01</span><span class="pill">candidate</span></div></div><div class="card asset"><div class="thumb video"></div><div class="asset-body"><b>5 秒推轨预览</b><span class="small">video · task recovered</span><span class="pill green">done</span></div></div></div><div class="section"><div class="between"><b>本轮上下文</b><span class="pill green">已固定</span></div><p class="hint">包含主 Thread 最近 8 条消息、2 张参考素材、项目固定风格“雨夜电影感”。不包含服装 Thread 的临时讨论。</p></div></div><aside class="panel detail"><div class="h2">素材详情</div><div class="thumb" style="height:180px;border-radius:16px"></div><div class="section kv"><span>来源</span><b>Prompt Agent + image-to-image</b><span>模型</span><b>自定义 API · Wan2.2</b><span>复现</span><b>recipe-level</b><span>上下文</span><b>ctx_91f4</b></div><button class="btn primary">作为参考继续修改</button><button class="btn">生成视频</button><button class="btn ghost">查看来源记录</button></aside></div></section>`,
agent:`<section class="screen active"><div class="between"><div><div class="h1">Prompt Agent 协作</div><div class="hint">Agent 不是聊天群，而是把脑海画面转成可审查的 prompt plan。</div></div><span class="pill purple">Agent layer</span></div><div class="two"><div class="panel detail"><div class="h2">用户意图</div><div class="msg user">一个雨夜红伞女性，像电影开场，画面安静但有张力。</div><div class="agent-card"><div class="between"><b>Intent Clarifier</b><span class="pill amber">needs choice</span></div><p class="hint">建议确认：人物年龄感、镜头距离、是否保留城市霓虹、视频运动方向。</p></div><div class="agent-card"><div class="between"><b>Prompt Builder</b><span class="pill green">ready</span></div><p class="hint">35mm cinematic medium shot, woman holding red umbrella, rainy night street, neon reflections, quiet expression, misty backlight...</p></div><div class="agent-card"><div class="between"><b>Visual Consistency Critic</b><span class="pill blue">advisory</span></div><p class="hint">保持：红伞、冷暖对比、街道透视。风险：雨滴过多会干扰后续视频一致性。</p></div></div><div class="panel detail"><div class="h2">可审查 Prompt Plan</div><div class="section"><b>保持</b><div class="tag-list" style="margin-top:8px"><span class="pill blue">红伞</span><span class="pill blue">街道透视</span><span class="pill blue">冷暖对比</span></div></div><div class="section"><b>改变</b><div class="tag-list" style="margin-top:8px"><span class="pill amber">雨 → 薄雾</span><span class="pill amber">表情更安静</span></div></div><div class="section"><b>待确认</b><p class="hint">是否需要更像定格电影剧照，还是为后续视频保留更明确运动方向？</p></div><div class="row"><button class="btn primary">接受并生成</button><button class="btn">编辑 Prompt</button><button class="btn ghost">忽略建议</button></div></div></div></section>`,
stable:`<section class="screen active"><div class="between"><div><div class="h1">稳定修改模式</div><div class="hint">把黑盒/白盒翻译成用户能理解的：简单、稳定、专家。</div></div><span class="pill amber">Stable Edit</span></div><div class="workspace"><div class="panel detail"><div class="thumb" style="height:260px;border-radius:18px"></div><div class="three"><button class="btn primary">简单修改</button><button class="btn">稳定修改</button><button class="btn ghost">专家参数</button></div><div class="section edit-row"><b>保持什么</b><div class="tag-list"><span class="pill blue">红伞</span><span class="pill blue">构图</span><span class="pill blue">35mm 镜头</span></div></div><div class="section edit-row"><b>改变什么</b><div class="tag-list"><span class="pill amber">雨变薄雾</span><span class="pill amber">表情更克制</span><span class="pill amber">背景更干净</span></div></div><div class="section edit-row"><b>参考素材</b><div class="tag-list"><span class="pill">主图 A01</span><span class="pill">色调 B03</span></div></div></div><aside class="panel detail"><div class="h2">专家折叠区</div><div class="section kv"><span>Seed</span><b>锁定</b><span>Reference</span><b>0.72</b><span>Prompt diff</span><b>可查看</b><span>Mask</span><b>未启用</b></div><div class="section"><b>复现等级</b><p class="hint">当前 provider 只保证 recipe-level，不承诺像素级复现。</p><span class="pill blue">recipe</span></div><button class="btn primary">生成稳定修改版本</button><button class="btn ghost">查看本轮上下文</button></aside></div></section>`,
capability:`<section class="screen active"><div class="between"><div><div class="h1">Provider / API 能力配置</div><div class="hint">自由配置 API 的核心是能力描述，而不是无限新增表单。</div></div><span class="pill red">Secrets hidden</span></div><div class="panel detail"><div class="two"><div class="section"><div class="h2">基础连接</div><div class="kv" style="margin-top:10px"><span>名称</span><b>Custom Wan Relay</b><span>Endpoint</span><b>https://api.example.com/v1</b><span>API Key</span><b>[REDACTED]</b><span>默认模型</span><b>wan2.2-image</b></div></div><div class="section"><div class="h2">能力检测</div><p class="hint">系统根据 operation、input/output、参数 schema 判断能否承接本轮生成，不静默换模型。</p><div class="tag-list"><span class="pill green">text-to-image</span><span class="pill green">image-to-image</span><span class="pill amber">image-to-video async</span><span class="pill">inpaint unknown</span></div></div></div><div class="cap-table"><div><b>Operation</b></div><div><b>Input</b></div><div><b>Output</b></div><div><b>Status</b></div><div>text-to-image</div><div>text</div><div>image</div><div><span class="pill green">ready</span></div><div>image-to-image</div><div>text + image</div><div>image</div><div><span class="pill green">ready</span></div><div>image-to-video</div><div>image + prompt</div><div>video</div><div><span class="pill amber">async</span></div></div><div class="section"><b>参数映射</b><p class="hint">requested: ratio=16:9, duration=5s → effective: size=1344x768, duration=5.0, poll=/tasks/:id。差异会写入 Replay Recipe。</p></div></div></section>`,
threads:`<section class="screen active"><div class="between"><div><div class="h1">多 Thread / 上下文控制</div><div class="hint">多对话不是互相污染的聊天框，而是同一 Project 下可控共享。</div></div><span class="pill blue">Project Core</span></div><div class="three"><div class="panel detail"><div class="h2">Thread A · 主画面</div><p class="hint">当前上下文包含最近 8 条消息、红伞主图、项目风格。</p><span class="pill green">active</span><span class="pill blue">ctx_91f4</span></div><div class="panel detail"><div class="h2">Thread B · 镜头运动</div><p class="hint">隔离讨论推轨、景深和视频节奏，可显式引用主图。</p><span class="pill">isolated</span><span class="pill amber">2 shared assets</span></div><div class="panel detail"><div class="h2">Thread C · 服装细节</div><p class="hint">服装和角色小样，不默认进入主画面上下文。</p><span class="pill">not included</span></div></div><div class="panel detail"><div class="between"><div class="h2">本轮上下文抽屉</div><span class="pill green">frozen before run</span></div><div class="four"><div class="card spec-card"><b>消息</b><p class="hint">Thread A 最近 8 条</p></div><div class="card spec-card"><b>素材</b><p class="hint">A01 红伞主图、B03 色调参考</p></div><div class="card spec-card"><b>项目事实</b><p class="hint">电影感、雨夜、冷暖对比</p></div><div class="card spec-card"><b>排除</b><p class="hint">服装 Thread 临时分歧</p></div></div></div></section>`,
pipeline:`<section class="screen active"><div class="between"><div><div class="h1">Pipeline 高级视图</div><div class="hint">Pipeline 表达计划怎么执行；Lineage 记录实际怎么产生。</div></div><span class="pill purple">Expert view</span></div><div class="panel pipeline"><div class="node" style="left:36px;top:62px"><b>Intent</b><p class="hint">雨夜红伞短片</p><span class="pill green">ready</span></div><div class="edge" style="left:220px;top:106px;width:105px"></div><div class="node" style="left:330px;top:62px"><b>Prompt Plan</b><p class="hint">Clarifier + Builder</p><span class="pill blue">reviewed</span></div><div class="edge" style="left:514px;top:106px;width:105px"></div><div class="node" style="left:624px;top:62px"><b>Image Gen</b><p class="hint">wan2.2 image</p><span class="pill green">done</span></div><div class="node" style="left:330px;top:260px"><b>Stable Edit</b><p class="hint">keep/change refs</p><span class="pill amber">queued</span></div><div class="edge" style="left:514px;top:304px;width:105px"></div><div class="node" style="left:624px;top:260px"><b>Image to Video</b><p class="hint">5s push-in</p><span class="pill amber">async</span></div><div class="section" style="position:absolute;right:30px;bottom:30px;width:330px"><b>Representability</b><p class="hint">该 Pipeline 可投影到 Canvas；Canvas 任意摆放不一定能无损转回 Pipeline。</p></div></div></section>`,
canvas:`<section class="screen active"><div class="between"><div><div class="h1">Infinite Canvas + Lineage Overlay</div><div class="hint">Canvas 是空间整理，Lineage 是来源事实；可叠加，不混用。</div></div><span class="pill purple">Lineage overlay on</span></div><div class="canvas"><div class="canvas-item" style="left:60px;top:70px;width:210px"><div class="thumb" style="height:120px;border-radius:12px"></div><b>A01 红伞主图</b><div class="small">recipe · prompt plan</div></div><div class="line" style="left:270px;top:155px;width:150px;transform:rotate(10deg)"></div><div class="canvas-item" style="left:420px;top:110px;width:210px"><div class="thumb alt" style="height:120px;border-radius:12px"></div><b>A02 薄雾修改</b><div class="small">parent: A01</div></div><div class="line" style="left:630px;top:205px;width:150px;transform:rotate(18deg)"></div><div class="canvas-item" style="left:780px;top:190px;width:220px"><div class="thumb video" style="height:120px;border-radius:12px"></div><b>V01 5 秒推轨</b><div class="small">video-source: A02</div></div><div class="canvas-item" style="left:160px;top:360px;width:300px"><b>Prompt Brief</b><p class="hint">保持红伞和街道透视，弱化雨滴，强化薄雾和安静情绪。</p></div><div class="canvas-item" style="right:28px;top:28px;width:280px"><b>来源记录</b><p class="hint">A02 ← A01 + prompt diff + ctx_91f4。Lineage 只记录事实，不控制执行。</p><span class="pill blue">recipe</span></div></div></section>`,
spec:`<section class="screen active spec-board"><div class="between"><div><div class="h1">v1.0 UI 规范板</div><div class="hint">默认简单、底层完整、高级渐进。</div></div><span class="pill green">Guidelines</span></div><div class="spec-grid"><div class="card spec-card"><b>三层界面</b><p class="hint">默认：对话生成；高级：稳定修改；专家：Pipeline/API/Lineage。</p></div><div class="card spec-card"><b>内部词隔离</b><p class="hint">ContextSnapshot 在 UI 叫“本轮上下文”；Attempt 叫“重试记录”。</p></div><div class="card spec-card"><b>Agent 原则</b><p class="hint">Agent 给建议和计划，不绕过用户确认执行。</p></div><div class="card spec-card"><b>复现等级</b><p class="hint">exact / seeded / recipe / record-only，远程生成默认 recipe。</p></div><div class="card spec-card"><b>组件</b><p class="hint">ContextDrawer、AgentSuggestionCard、StableEditPanel、CapabilityCard、PipelineNode。</p></div><div class="card spec-card"><b>安全</b><p class="hint">密钥显示 [REDACTED]；Renderer 不透传任意 headers。</p></div><div class="card spec-card"><b>Canvas 边界</b><p class="hint">Canvas 管空间；Pipeline 管计划；Lineage 管事实。</p></div><div class="card spec-card"><b>Don’t</b><p class="hint">默认不做节点编辑器，不承诺远程像素级复现。</p></div></div><div class="two"><div class="panel detail"><div class="h2">Light tokens</div><div class="tag-list"><span class="pill">panel</span><span class="pill">card</span><span class="pill blue">accent</span><span class="pill green">success</span><span class="pill amber">warning</span></div></div><div class="panel detail" data-theme="dark"><div class="h2">Dark is same architecture</div><div class="tag-list"><span class="pill">panel</span><span class="pill blue">context</span><span class="pill purple">expert</span><span class="pill red">redacted</span></div></div></div></section>`
};

function render(){const q=new URLSearchParams(location.search);let key=q.get('screen')||'01-default-creative-workspace';let id=order[key]||key;if(!screens[id]) id='workspace';document.getElementById('screens').innerHTML=screens[id];if(key==='08-vision-ui-specification')document.getElementById('screens').style.gridTemplateRows='1fr';}
